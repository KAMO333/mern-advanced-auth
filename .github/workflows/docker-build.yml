name: Docker Build Check

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:18-bullseye-slim
    steps:
      - uses: actions/checkout@v4
      - name: Install legacy libraries
        run: |
          apt-get update
          apt-get install -y libcurl4 libssl1.1 liblzma5
          rm -rf /var/lib/apt/lists/*
      - name: Install dependencies
        run: npm install
      - name: Run Tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci

  # NEW SEPARATE JOB: Verifies the Dockerfile builds correctly
  docker-verify:
    needs: test # Only build if tests pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t auth-system-test .
